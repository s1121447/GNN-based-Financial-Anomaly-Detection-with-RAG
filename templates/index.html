<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GNN 金融供應鏈異常偵測系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            text-align: center;
            background: #f4f7f6;
            padding-bottom: 50px;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }
        input {
            padding: 12px;
            width: 260px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        #main-btn {
            padding: 12px 24px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .node-btn {
            margin: 5px;
            padding: 8px 14px;
            background: white;
            border: 1px solid #d32f2f;
            color: #d32f2f;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .report-box {
            margin-top: 24px;
            padding: 24px;
            border-left: 5px solid #d32f2f;
            background: #fff9f9;
            border-radius: 10px;
            text-align: left;
        }
        .helper {
            margin-top: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>GNN 金融供應鏈異常偵測系統</h1>

    <form method="POST">
        <input type="text" name="symbol" placeholder="輸入台股代號（如 2330）" required>
        <button type="submit" id="main-btn">啟動 GNN 推論</button>
    </form>

    {% if plot_url %}
        <h2 style="margin-top:40px;">供應鏈風險圖譜（GNN 推論模式）</h2>
        <img src="data:image/png;base64,{{ plot_url }}" width="100%" style="border-radius: 10px; border: 1px solid #eee;">

        <div class="helper">點擊下方公司標籤，獲取個別 AI 診斷報告：</div>
        <div style="margin-top: 10px;">
            {% for symbol, name in stocks_info %}
                <button class="node-btn" onclick="fetchIndividualReport('{{ symbol }}', '{{ name }}', this)">
                    {{ name }}
                </button>
            {% endfor %}
        </div>

        <div class="report-box" id="ai-report-container">
            <h3 id="report-title">🔍 AI 自動化診斷報告</h3>
            <p id="report-content">{{ report }}</p>
        </div>
    {% elif report %}
        <div class="report-box">
            <p>{{ report }}</p>
        </div>
    {% endif %}
</div>

<script>
document.querySelector("form").onsubmit = function() {
    const btn = document.getElementById("main-btn");
    btn.disabled = true;
    btn.innerText = "正在進行 GNN 推論...";
};

function fetchIndividualReport(symbol, name, btnElement) {
    const content = document.getElementById("report-content");
    const title = document.getElementById("report-title");

    content.innerText = "正在分析 " + name + " (" + symbol + ") ...";
    title.innerText = "🔍 個股深度分析：" + name;

    fetch('/analyze_individual/' + symbol + '?name=' + encodeURIComponent(name))
        .then(response => response.json())
        .then(data => {
            content.innerText = data.report;
        })
        .catch(error => {
            content.innerText = "分析失敗：" + error.message;
        });
}
</script>
</body>
</html>
